</style> <script>
  (() => {
    const nav = document.querySelector(".header-nav");
    const trigger = nav?.querySelector(".header-nav-mobile-menu");
    const list = nav?.querySelector(".header-nav-list");
    if (!nav || !trigger || !list) return;

    const setOpen = (open) => {
      trigger.classList.toggle("active", open);
      list.classList.toggle("visible", open);
      trigger.setAttribute("aria-expanded", String(open));
    };

    const toggle = (event) => {
      event.preventDefault();
      event.stopPropagation();
      setOpen(!list.classList.contains("visible"));
    };

    trigger.addEventListener("click", toggle);
    trigger.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        toggle(event);
        return;
      }
      if (event.key === "Escape") {
        setOpen(false);
      }
    });
    list.addEventListener("click", (event) => {
      const target = event.target;
      if (target instanceof Element && target.closest("a")) {
        setOpen(false);
      }
    });
    document.addEventListener("click", (event) => {
      const target = event.target;
      if (target instanceof Node && !nav.contains(target)) {
        setOpen(false);
      }
    });
    window.addEventListener("resize", () => {
      if (window.matchMedia("(min-width: 1191px)").matches) {
        setOpen(false);
      }
    });
  })();
</script> <script>
  (() => {
    const wrap = document.querySelector(".header-notification");
    const list = document.querySelector(".header-notification-list");
    const readButton = document.querySelector(".header-notification-read");
    if (!wrap || !list || !readButton) return;

    let currentItems = [];
    let closeTimer = 0;
    const endpoint = "/apis/notification.halo.run/v1alpha1/notifications?page=1&size=5";

    const t = {
      fallback: "\u4f60\u6709\u4e00\u6761\u65b0\u901a\u77e5",
      empty: "\u6682\u65e0\u901a\u77e5",
      loadingFailed: "\u767b\u5f55\u540e\u67e5\u770b\u901a\u77e5",
      justNow: "\u521a\u521a",
    };

    const normalizeItems = (data) => {
      const items = data && (data.items || []);
      return items.slice(0, 5).map((item) => {
        const spec = item.spec || item;
        return {
          name: (item.metadata && item.metadata.name) || item.name || spec.name || "",
          title: spec.title || spec.rawContent || spec.reason || t.fallback,
          time: (item.metadata && item.metadata.creationTimestamp) || "",
          unread: spec.unread === true,
          href: "/uc/notifications",
        };
      });
    };

    const escapeHtml = (value) =>
      String(value || "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char]);

    const render = (items) => {
      if (!items.length) {
        list.innerHTML = '<div class="header-notification-empty">' + t.empty + "</div>";
        return;
      }
      list.innerHTML = items
        .map((item) => {
          const unreadClass = item.unread ? " unread" : "";
          return (
            '<a class="header-notification-item' +
            unreadClass +
            '" href="' +
            item.href +
            '" data-name="' +
            escapeHtml(item.name) +
            '"><div class="header-notification-title">' +
            escapeHtml(item.title) +
            '</div><div class="header-notification-meta">' +
            escapeHtml(item.time || t.justNow) +
            "</div></a>"
          );
        })
        .join("");
    };

    const load = async () => {
      try {
        const response = await fetch(endpoint, { credentials: "include", headers: { Accept: "application/json" } });
        if (!response.ok) throw new Error("notification request failed");
        currentItems = normalizeItems(await response.json());
        render(currentItems);
        return;
      } catch (error) {
        currentItems = [];
        list.innerHTML = '<div class="header-notification-empty">' + t.loadingFailed + "</div>";
      }
    };

    const markAllRead = async () => {
      const unreadItems = currentItems.filter((item) => item.unread && item.name);
      if (!unreadItems.length) {
        load();
        return;
      }
      readButton.disabled = true;
      const body = JSON.stringify([{ op: "replace", path: "/spec/unread", value: false }]);
      try {
        await Promise.all(
          unreadItems.map((item) =>
            fetch("/apis/notification.halo.run/v1alpha1/notifications/" + encodeURIComponent(item.name), {
              method: "PATCH",
              credentials: "include",
              headers: { "Content-Type": "application/json-patch+json" },
              body,
            })
          )
        );
        load();
      } catch (error) {
        window.location.href = "/uc/notifications";
      } finally {
        readButton.disabled = false;
      }
    };

    const open = () => {
      window.clearTimeout(closeTimer);
      document.querySelector(".header-account")?.classList.remove("open");
      wrap.classList.add("open");
      load();
    };
    const close = () => {
      closeTimer = window.setTimeout(() => wrap.classList.remove("open"), 120);
    };

    wrap.addEventListener("mouseenter", open);
    wrap.addEventListener("mouseleave", close);
    wrap.addEventListener("focusin", open);
    wrap.addEventListener("focusout", close);
    document.querySelector(".header-notification-trigger")?.addEventListener("click", (event) => {
      if (!wrap.classList.contains("open")) {
        event.preventDefault();
        open();
      }
    });
    document.addEventListener("click", (event) => {
      const target = event.target;
      if (target instanceof Node && !wrap.contains(target)) {
        wrap.classList.remove("open");
      }
    });
    readButton.addEventListener("click", (event) => {
      event.preventDefault();
      markAllRead();
    });
  })();
</script> <script>

  (() => {
    const backTop = document.querySelector(".back-to-top");
    const themeSwitch = document.querySelector(".theme-switch");
    const lightLink = document.querySelector('link[title="light"]');
    const darkLink = document.querySelector('link[title="dark"]');

    const applyTheme = (theme) => {
      if (!lightLink || !darkLink) return;
      const isDark = theme === "dark";
      lightLink.disabled = isDark;
      darkLink.disabled = !isDark;
      themeSwitch?.classList.toggle("dark", isDark);
      localStorage.setItem("halorum_theme", theme);
    };

    const savedTheme = localStorage.getItem("halorum_theme");
    if (savedTheme === "dark" || savedTheme === "light") {
      applyTheme(savedTheme);
    }

    themeSwitch?.addEventListener("click", () => {
      const next = themeSwitch.classList.contains("dark") ? "light" : "dark";
      applyTheme(next);
    });

    const onScroll = () => {
      backTop?.classList.toggle("visible", window.scrollY > 300);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();

    backTop?.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  })();
</script> <script th:if="${!#strings.isEmpty(theme.config.custom.customJs)}" th:utext="${theme.config.custom.customJs}"></script> </body> </html>
