name: CD

on:
  release:
    types:
      - published

jobs:
  cd:
    uses: halo-sigs/reusable-workflows/.github/workflows/theme-cd.yaml@v3
    permissions:
      contents: write
    secrets:
      halo-pat: ${{ secrets.HALO_PAT }}
    with:
      node-version: 22
      pnpm-version: 10.8.0
      skip-appstore-release: false
      app-id: app-slsvrqpt
